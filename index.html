<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    height: 100vh;
    padding: 30px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .tg-widget {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #0a0a0a;
    border-radius: 18px;
    padding: 16px 26px;
    position: relative;
    border: 2px solid #FFD700;
    animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, glowPulse 3s ease-in-out infinite;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.85); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes glowPulse {
    0%, 100% {
      border-color: #FFD700;
      box-shadow: 0 0 10px #FFD700, 0 0 30px #FFD70088, 0 0 60px #FFD70033;
    }
    50% {
      border-color: #FFF200;
      box-shadow: 0 0 20px #FFF200, 0 0 60px #FFD700bb, 0 0 100px #FFD70066;
    }
  }

  .shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,215,0,0.15) 50%, transparent 100%);
    border-radius: 18px;
    animation: shineSweep 3s ease-in-out infinite;
  }

  @keyframes shineSweep {
    0%   { left: -100%; }
    40%, 100% { left: 160%; }
  }

  .tg-icon-wrap {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, #229ED9, #1a7fb8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid #FFD700;
    animation: iconSpin 6s ease-in-out infinite;
    box-shadow: 0 0 14px #FFD70088;
  }

  @keyframes iconSpin {
    0%   { transform: rotate(0deg) scale(1); }
    10%  { transform: rotate(-10deg) scale(1.1); }
    20%  { transform: rotate(10deg) scale(1.15); }
    30%  { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .tg-icon-wrap svg { width: 26px; height: 26px; }

  .tg-text { display: flex; flex-direction: column; gap: 5px; z-index: 1; }

  .tg-label {
    font-size: 12px;
    color: #FFD700;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: labelFlash 3s ease-in-out infinite;
  }

  @keyframes labelFlash {
    0%, 80%, 100% { opacity: 1; text-shadow: 0 0 8px #FFD700; }
    90%           { opacity: 0.4; text-shadow: none; }
  }

  .tg-username {
    font-size: 20px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 0 12px #FFD70066;
    animation: textScale 3s ease-in-out infinite;
  }

  @keyframes textScale {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.03); }
  }

  .particles {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 18px;
    overflow: hidden;
    pointer-events: none;
  }

  .p {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #FFD700;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  .p:nth-child(1)  { left: 10%; animation-duration: 2.5s; animation-delay: 0s;    width: 2px; height: 2px; }
  .p:nth-child(2)  { left: 25%; animation-duration: 3.1s; animation-delay: 0.5s; }
  .p:nth-child(3)  { left: 40%; animation-duration: 2.2s; animation-delay: 1s;    width: 2px; height: 2px; }
  .p:nth-child(4)  { left: 60%; animation-duration: 3.4s; animation-delay: 0.2s; }
  .p:nth-child(5)  { left: 75%; animation-duration: 2.8s; animation-delay: 0.8s;  width: 2px; height: 2px; }
  .p:nth-child(6)  { left: 88%; animation-duration: 2.0s; animation-delay: 1.3s; }

  @keyframes floatUp {
    0%   { bottom: -5px; opacity: 0; }
    20%  { opacity: 0.9; }
    80%  { opacity: 0.4; }
    100% { bottom: 105%; opacity: 0; }
  }
</style>
</head>
<body>
<div class="tg-widget">
  <div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div>
  </div>
  <div class="shine"></div>
  <div class="tg-icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M21.8 2.3L1.3 10.2c-1.3.5-1.3 1.4-.2 1.7l5.1 1.6 11.8-7.4c.6-.4 1.1-.2.7.2L8.5 15.6v2.6l2.4-2.3 4.7 3.5c.9.5 1.5.2 1.7-.8L22.9 3.4c.3-1.3-.5-1.9-1.1-1.1z" fill="white"/>
    </svg>
  </div>
  <div class="tg-text">
    <span class="tg-label">🏆 Турниры тут!</span>
    <span class="tg-username">t.me/BrawlCUP_lig</span>
  </div>
</div>
</body>
</html>
